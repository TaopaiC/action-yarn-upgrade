name: Continuous Integration (Action Test)

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Git user
        run: |
          git config user.name github-actions[bot]
          git config user.email 124380+github-actions[bot]@users.noreply.github.com

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workdir: 'test'
          base_branch: ${{ github.ref_name }}
          labels: 'action_test'
          npmMinimalAgeGate: '1d'
          pr_prefix: 'TEST: DEPS'
          severity: 'low'

      - name: Print Output
        id: output
        run: |
          echo "${{ steps.test-action.outputs.pr_url }}"
          echo "${{ steps.test-action.outputs.report }}"
