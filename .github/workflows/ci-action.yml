name: Continuous Integration (Action Test)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  test-action:
    name: GitHub Actions Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Git user
        run: |
          git config user.name github-actions[bot]
          git config user.email 124380+github-actions[bot]@users.noreply.github.com

      - name: Test Local Action
        id: test-action
        uses: ./
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workdir: 'test'
          base_branch:
            ${{ github.event_name == 'pull_request' && github.head_ref ||
            github.ref_name }}
          labels: 'action_test'

      - name: Print Output
        id: output
        run: |
          echo "${{ steps.test-action.outputs.pr_url }}"
          echo "${{ steps.test-action.outputs.report }}"
