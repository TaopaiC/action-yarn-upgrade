name: Yarn CVE Auto-Upgrade
description: >
  Automatically upgrades yarn packages to resolve CVE vulnerabilities, commits
  the yarn.lock changes to a new branch, and opens a pull request.
author: TaopaiC
branding:
  icon: shield
  color: green

inputs:
  module_list:
    description: >
      Comma-separated list of npm module names to upgrade (e.g. "lodash,axios").
      If omitted, the action runs `yarn npm audit` to discover vulnerable
      packages automatically.
    required: false
    default: ''
  workdir:
    description: >
      Working directory in which to run yarn and git commands. Defaults to the
      repository root.
    required: false
    default: ''
  base_branch:
    description: >
      Target branch for the pull request. Defaults to the branch the action is
      running on when left empty.
    required: false
    default: ''
  pr_prefix:
    description: >
      Prefix used in the pull request title (e.g. "CHORE", "fix", "deps").
    required: false
    default: 'CHORE'
  labels:
    description: >
      Comma-separated list of labels to apply to the pull request (e.g.
      "dependencies,security"). Leave empty to add no labels.
    required: false
    default: ''
  npmMinimalAgeGate:
    description: >
      Minimum package publish age required before a version is accepted. Accepts
      a plain number or a number with a time unit suffix (ms, s, m, h, d, w) —
      e.g. "72h" or "3d". Only applies to Yarn Berry (v2+); has no effect on
      Yarn v1. Leave empty to skip setting this value.
    required: false
    default: ''
  github_token:
    description: >
      GitHub token used to create the pull request. Typically
      `secrets.GITHUB_TOKEN`.
    required: true

outputs:
  report:
    description: >
      Human-readable upgrade summary listing which modules were upgraded, left
      unchanged, or failed.
  pr_url:
    description: >
      URL of the pull request created with the yarn.lock changes. Empty if no
      modules were upgraded.

runs:
  using: node24
  main: dist/index.js
